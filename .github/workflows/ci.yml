name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------- 1. test ----------
  test:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: stock
          POSTGRES_PASSWORD: stock
          POSTGRES_DB: stockapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stock -d stockapp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # host เป็น localhost เพราะ service container map port ออกมาที่ runner
      DATABASE_URL: postgresql://stock:stock@localhost:5432/stockapp?schema=public

    steps:
      - uses: actions/checkout@v7

      # ต้องเป็น 11 ไม่ใช่ 9 — pnpm 9 อ่าน pnpm-workspace.yaml ที่มีแต่ `allowBuilds`
      # ไม่ได้ ("ERROR packages field missing or empty") เพราะ allowBuilds เป็นฟีเจอร์ pnpm 10+
      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      # postinstall รัน `prisma generate` ให้อัตโนมัติ → src/generated/prisma พร้อมใช้
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ตรวจว่า migration history ยัง apply กับ DB เปล่าได้จริง
      # (เทสต์ปัจจุบัน mock prisma ทั้งหมด — ขั้นนี้คือจุดเดียวที่ใช้ postgres service จริง)
      - name: Verify migrations apply cleanly
        run: pnpm prisma migrate deploy

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

  # ---------- 2. build-and-push ----------
  build-and-push:
    name: Build & Push image
    runs-on: ubuntu-latest
    needs: test
    # เฉพาะ push เข้า main — PR ไม่ push image (และ fork ไม่มีสิทธิ์เขียน registry)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
